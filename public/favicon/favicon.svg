<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="forge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flame-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#f97316;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0c0a09" stroke="url(#forge-grad)" stroke-width="12"/>
  <!-- Anvil base -->
  <path d="M160 340 L352 340 L340 360 L172 360 Z" fill="#78716c" />
  <path d="M140 320 L372 320 L352 340 L160 340 Z" fill="#a8a29e" />
  <path d="M200 360 L312 360 L302 400 L210 400 Z" fill="#78716c" />
  <path d="M190 400 L322 400 L316 420 L196 420 Z" fill="#57534e" />
  <!-- Hammer -->
  <rect x="244" y="140" width="24" height="120" rx="4" fill="#a8a29e" transform="rotate(-15, 256, 200)"/>
  <rect x="220" y="110" width="72" height="40" rx="6" fill="#78716c" transform="rotate(-15, 256, 130)"/>
  <rect x="224" y="114" width="64" height="32" rx="4" fill="#d6d3d1" transform="rotate(-15, 256, 130)"/>
  <!-- Sparks/Stars -->
  <circle cx="180" cy="180" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="320" cy="160" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="200" cy="220" r="3" fill="#f97316" opacity="0.7"/>
  <circle cx="340" cy="240" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="170" cy="260" r="2.5" fill="#f97316" opacity="0.6"/>
  <circle cx="350" cy="190" r="2.5" fill="#fbbf24" opacity="0.7"/>
  <!-- Flame above anvil -->
  <path d="M240 310 Q250 270 256 240 Q262 270 272 310 Z" fill="url(#flame-grad)" opacity="0.6"/>
  <path d="M244 310 Q252 280 256 255 Q260 280 268 310 Z" fill="#fbbf24" opacity="0.4"/>
  <!-- Letter P subtle in background -->
  <text x="256" y="290" text-anchor="middle" font-family="Arial Black, Arial" font-size="120" font-weight="900" fill="#f59e0b" opacity="0.15">P</text>
</svg>
